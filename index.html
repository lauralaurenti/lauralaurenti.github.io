<!DOCTYPE html>
<html lang="en" x-data="{ mobileMenu: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura Laurenti | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        .nav-link { @apply relative text-zinc-500 hover:text-zinc-900 transition-colors py-2; }
        .nav-link.active { @apply text-zinc-900 font-semibold; }
        .nav-link.active::after { content: ''; @apply absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-emerald-900 rounded-full; }
    </style>
</head>
<body class="bg-white text-zinc-900 font-sans antialiased">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-50">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-sm font-bold uppercase tracking-[0.2em]">L. Laurenti</a>
            
            <!-- Desktop Nav -->
            <div class="hidden md:flex gap-10 text-[11px] uppercase tracking-widest font-bold">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="publications.html" class="nav-link">Publications</a>
            </div>

            <button @click="mobileMenu = !mobileMenu" class="md:hidden"><i data-lucide="menu" class="w-6 h-6"></i></button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div x-show="mobileMenu" class="fixed inset-0 z-[60] bg-white p-8 md:hidden">
        <div class="flex justify-end"><button @click="mobileMenu = false"><i data-lucide="x" class="w-8 h-8"></i></button></div>
        <div class="flex flex-col gap-8 mt-12 text-3xl font-bold tracking-tighter">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="publications.html">Publications</a>
        </div>
    </div>

    <!-- Hero Content -->
    <main class="max-w-5xl mx-auto px-6 py-24 md:py-40">
        <div class="flex flex-col-reverse md:flex-row items-center gap-16">
            <div class="flex-1 text-center md:text-left">
                <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-8 leading-[0.9]">Laura Laurenti. <br><span class="text-zinc-400">AI & Seismology.</span></h1>
                <p class="text-xl text-zinc-500 max-w-lg mb-12 font-light leading-relaxed">
                    Postdoctoral researcher at ETH Zürich. I develop machine learning frameworks to decode seismic activity and understand Earth's hidden dynamics.
                </p>
                <div class="flex justify-center md:justify-start gap-8 text-zinc-400">
                    <a href="https://github.com/lauralaurenti" class="hover:text-emerald-900 transition-colors"><i data-lucide="github"></i></a>
                    <a href="https://linkedin.com/in/lauralaurenti/" class="hover:text-emerald-900 transition-colors"><i data-lucide="linkedin"></i></a>
                    <a href="mailto:laurenti.laura.work@gmail.com" class="hover:text-emerald-900 transition-colors"><i data-lucide="mail"></i></a>
                </div>
            </div>
            <div class="w-48 h-48 md:w-80 md:h-80 rounded-full border-4 border-emerald-900/10 p-2">
                <img src="images/profilePic.jpg" class="w-full h-full object-cover rounded-full shadow-xl" alt="Laura Laurenti">
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
